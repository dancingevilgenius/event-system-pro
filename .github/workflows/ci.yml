name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-ends/front-end-cursor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: front-ends/front-end-cursor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          VITE_POSTGREST_URL: http://localhost:8090/api
          VITE_MAILER_URL: http://localhost:8090/mailer
          VITE_REALTIME_WS_URL: ws://localhost:8090/realtime/ws
          VITE_GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_GIT_BRANCH: ${{ github.ref_name }}
          VITE_GIT_COMMIT: ${{ github.sha }}
          VITE_GIT_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          VITE_BUILD_DATE: ${{ github.event.head_commit.timestamp }}

  docker:
    name: Docker images and compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build web image
        run: |
          docker build \
            -f deploy/Dockerfile.web \
            --build-arg VITE_POSTGREST_URL=http://localhost:8090/api \
            --build-arg VITE_MAILER_URL=http://localhost:8090/mailer \
            --build-arg VITE_REALTIME_WS_URL=ws://localhost:8090/realtime/ws \
            --build-arg GITHUB_REPOSITORY=${{ github.repository }} \
            --build-arg GIT_BRANCH=${{ github.ref_name }} \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg GIT_COMMIT_MESSAGE="${{ github.event.head_commit.message }}" \
            --build-arg BUILD_DATE=${{ github.event.head_commit.timestamp }} \
            -t event-system-pro-web \
            .

      - name: Build mailer image
        run: docker build -t event-system-pro-mailer back-ends/mailer

      - name: Build realtime image
        run: docker build -t event-system-pro-realtime back-ends/realtime

      - name: Build scheduler image
        run: docker build -f deploy/Dockerfile.scheduler -t event-system-pro-scheduler .

      - name: Validate compose files
        run: |
          docker compose -f deploy/docker-compose.yml config --quiet
          docker compose -f deploy/docker-compose.dokploy.yml \
            --env-file deploy/.env.dokploy.example config --quiet

  stack-smoke:
    name: Full stack smoke test
    runs-on: ubuntu-latest
    needs: [frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          cp deploy/.env.example deploy/.env
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env up --build -d

      - name: Wait for services
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8090/ >/dev/null \
              && curl -sf http://localhost:8090/api/ >/dev/null \
              && curl -sf http://localhost:8090/mailer/health >/dev/null \
              && curl -sf http://localhost:8090/realtime/health >/dev/null; then
              echo "Stack is healthy"
              exit 0
            fi
            echo "Waiting for stack... ($i/90)"
            sleep 5
          done
          echo "Stack did not become healthy in time"
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env ps
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs --no-color
          exit 1

      - name: Verify scheduler
        run: |
          set -euo pipefail
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env ps scheduler
          status="$(docker compose -f deploy/docker-compose.yml --env-file deploy/.env ps --status running --services | grep -x scheduler || true)"
          if [ "$status" != "scheduler" ]; then
            echo "scheduler service is not running"
            docker compose -f deploy/docker-compose.yml --env-file deploy/.env logs --no-color scheduler
            exit 1
          fi
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env \
            exec -T scheduler /run-maintenance-job.sh inactivity_logout
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env \
            exec -T scheduler /run-maintenance-job.sh nightly_cleanup
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env \
            exec -T scheduler sh -c \
            'export PGPASSWORD="$SCHEDULER_DB_PASSWORD"; psql -h postgres -U scheduler -d event_system_pro -v ON_ERROR_STOP=1 -c "SELECT api.scheduler_health();"'
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env \
            exec -T scheduler sh -c \
            'export PGPASSWORD="$SCHEDULER_DB_PASSWORD"; psql -h postgres -U scheduler -d event_system_pro -v ON_ERROR_STOP=1 -t -A -c "SELECT api.scheduler_crontab();"' \
            | grep -q 'run-maintenance-job.sh inactivity_logout'
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env \
            exec -T postgres \
            psql -U postgres -d event_system_pro -v ON_ERROR_STOP=1 -t -A \
            -c "SELECT COUNT(*) FROM maintenance.job_definition WHERE enabled;" \
            | grep -Eq '^[1-9][0-9]*$'
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env \
            exec -T postgres \
            psql -U postgres -d event_system_pro -v ON_ERROR_STOP=1 -t -A \
            -c "SELECT COUNT(*) FROM maintenance.job_run WHERE status IN ('ok','skipped');" \
            | grep -Eq '^[1-9][0-9]*$'
          docker compose -f deploy/docker-compose.yml --env-file deploy/.env \
            exec -T scheduler cat /etc/crontabs/root \
            | grep -q 'run-maintenance-job.sh nightly_cleanup'

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env down -v
