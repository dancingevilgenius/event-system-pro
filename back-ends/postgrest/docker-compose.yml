services:
  postgrest:
    image: postgrest/postgrest:v12.2.8
    container_name: event-system-pro-postgrest
    restart: unless-stopped
    ports:
      - "${PGRST_SERVER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Default dev secret when .env is missing; must match database app.jwt_secret.
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:-esp-dev-jwt-secret-change-in-production-min-32-chars}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  swagger:
    image: swaggerapi/swagger-ui:v5.18.2
    container_name: event-system-pro-swagger
    restart: unless-stopped
    ports:
      - "${SWAGGER_UI_PORT:-8080}:8080"
    environment:
      # Browser loads the spec from the host-mapped PostgREST port (not the internal service name).
      SWAGGER_JSON_URL: http://localhost:3000/
    depends_on:
      - postgrest

  mailpit:
    image: axllent/mailpit:latest
    container_name: event-system-pro-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  mailer:
    build:
      context: ../mailer
    container_name: event-system-pro-mailer
    restart: unless-stopped
    ports:
      - "${MAILER_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgres://mailer:mailer_dev_password@host.docker.internal:5432/event_system_pro
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      EMAIL_FROM: Event System Pro <no-reply@eventsystempro.local>
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mailpit

  realtime:
    build:
      context: ../realtime
    container_name: event-system-pro-realtime
    restart: unless-stopped
    ports:
      - "${REALTIME_PORT:-3002}:3002"
    environment:
      PORT: "3002"
      DATABASE_URL: postgres://realtime:realtime_dev_password@host.docker.internal:5432/event_system_pro
      COUNTER_INTERVAL_MS: ${COUNTER_INTERVAL_MS:-5000}
      POC_COUNTER_LABEL: poc_counter
    extra_hosts:
      - "host.docker.internal:host-gateway"
