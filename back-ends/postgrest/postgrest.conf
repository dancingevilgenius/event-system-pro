# PostgREST configuration for local development.
# Prefer environment variables in Docker (see docker-compose.yml).
# Native binary: postgrest postgrest.conf

db-uri = "postgres://authenticator:postgrest_dev_password@localhost:5432/event_system_pro"
db-schemas = "api"
db-anon-role = "anon"
db-pool = 10
server-host = "0.0.0.0"
server-port = 3000
openapi-server-proxy-uri = "http://localhost:3000"
server-cors-allowed-origins = "http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173"

# Must match database app.jwt_secret (database/migrations/018_auth_rbac.sql).
jwt-secret = "esp-dev-jwt-secret-change-in-production-min-32-chars"
