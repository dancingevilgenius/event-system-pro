# Dokploy full stack (postgres + migrate + PostgREST + mailer + scheduler + web + Caddy proxy).
# Dev/test email: Mailpit captures SMTP; optional UI on host port MAILPIT_UI_PORT (8025).
#
# Dokploy UI:
#   Type: Docker Compose (not Stack)
#   Compose path: deploy/docker-compose.dokploy.yml
#   Domains tab: leave empty — Traefik labels are on service "proxy" in compose
#   Env: copy from deploy/.env.dokploy.example
#   Dev DB access: optional — see DOKPLOY-CHECKLIST.md (do not publish 5432 by default).
#
# Only "proxy" joins dokploy-network (Traefik). Other services stay on the project
# default network so hostname "postgres" cannot resolve to another stack's DB.

networks:
  default:
  dokploy-network:
    external: true

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy}
      POSTGRES_DB: ${POSTGRES_DB:-event_system_pro}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-event_system_pro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    image: event-system-pro-migrate:latest
    restart: "no"
    environment:
      PGHOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy}
      POSTGRES_DB: ${POSTGRES_DB:-event_system_pro}
      SEED_DEV_DATA: ${SEED_DEV_DATA:-true}
    depends_on:
      postgres:
        condition: service_healthy

  postgrest:
    image: postgrest/postgrest:v12.2.8
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${PGRST_AUTHENTICATOR_PASSWORD:?Set PGRST_AUTHENTICATOR_PASSWORD}@postgres:5432/${POSTGRES_DB:-event_system_pro}
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_POOL: "10"
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: "3000"
      PGRST_OPENAPI_SERVER_PROXY_URI: ${APP_URL:-https://eventsystem.fun}/api
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-https://eventsystem.fun}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:?Set PGRST_JWT_SECRET in Dokploy}
    depends_on:
      migrate:
        condition: service_completed_successfully

  realtime:
    build:
      context: ../back-ends/realtime
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://realtime:${REALTIME_DB_PASSWORD:?Set REALTIME_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-event_system_pro}
      POC_COUNTER_LABEL: poc_counter
    depends_on:
      migrate:
        condition: service_completed_successfully

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"

  mailer:
    build:
      context: ../back-ends/mailer
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://mailer:${MAILER_DB_PASSWORD:-mailer_dev_password}@postgres:5432/${POSTGRES_DB:-event_system_pro}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      EMAIL_FROM: Event System Pro <no-reply@eventsystem.fun>
      APP_NAME: Event System Pro
      CORS_ORIGINS: ${CORS_ORIGINS:-https://eventsystem.fun}
    depends_on:
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  scheduler:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.scheduler
    image: event-system-pro-scheduler:latest
    restart: unless-stopped
    environment:
      PGHOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-event_system_pro}
      SCHEDULER_DB_USER: scheduler
      SCHEDULER_DB_PASSWORD: ${SCHEDULER_DB_PASSWORD:-scheduler_dev_password}
      TZ: ${TZ:-America/Chicago}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_POSTGREST_URL: ${VITE_POSTGREST_URL:-https://eventsystem.fun/api}
        VITE_MAILER_URL: ${VITE_MAILER_URL:-https://eventsystem.fun/mailer}
        VITE_REALTIME_WS_URL: ${VITE_REALTIME_WS_URL:-wss://eventsystem.fun/realtime/ws}
        DOKPLOY_COMMIT_HASH: ${DOKPLOY_COMMIT_HASH:-}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        DOKPLOY_COMMIT_MESSAGE: ${DOKPLOY_COMMIT_MESSAGE:-}
        GIT_COMMIT_MESSAGE: ${GIT_COMMIT_MESSAGE:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-dancingevilgenius/event-system-pro}
        BUILD_DATE: ${BUILD_DATE:-}
    restart: unless-stopped
    depends_on:
      - postgrest
      - realtime

  proxy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    image: event-system-pro-proxy:latest
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # Traefik routing (HTTP + HTTPS). If you use these labels, remove the same
      # domain from Dokploy Domains tab to avoid duplicate routers.
      - traefik.http.routers.${APP_NAME:-esp-compose}-proxy-secure.rule=Host(`${APP_DOMAIN:-eventsystem.fun}`)
      - traefik.http.routers.${APP_NAME:-esp-compose}-proxy-secure.entrypoints=websecure
      - traefik.http.routers.${APP_NAME:-esp-compose}-proxy-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.${APP_NAME:-esp-compose}-proxy-secure.service=${APP_NAME:-esp-compose}-proxy
      - traefik.http.routers.${APP_NAME:-esp-compose}-proxy-web.rule=Host(`${APP_DOMAIN:-eventsystem.fun}`)
      - traefik.http.routers.${APP_NAME:-esp-compose}-proxy-web.entrypoints=web
      - traefik.http.routers.${APP_NAME:-esp-compose}-proxy-web.middlewares=${APP_NAME:-esp-compose}-proxy-redirect
      - traefik.http.routers.${APP_NAME:-esp-compose}-proxy-web.service=${APP_NAME:-esp-compose}-proxy
      - traefik.http.middlewares.${APP_NAME:-esp-compose}-proxy-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.${APP_NAME:-esp-compose}-proxy-redirect.redirectscheme.permanent=true
      - traefik.http.services.${APP_NAME:-esp-compose}-proxy.loadbalancer.server.port=80
    volumes:
      - caddy_data:/data
    depends_on:
      - web
      - postgrest
      - realtime
      - mailer

volumes:
  pgdata:
  caddy_data:
