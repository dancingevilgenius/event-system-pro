# Dokploy full stack (postgres + migrate + PostgREST + web + Caddy proxy).
# Mailer omitted initially — add later when SMTP is configured.
#
# Dokploy UI:
#   Type: Docker Compose (not Stack)
#   Compose path: deploy/docker-compose.dokploy.yml
#   Domains tab: leave empty — Traefik labels are on service "proxy" in compose
#   Env: copy from deploy/.env.dokploy.example
#   Dev DB access: set POSTGRES_PUBLISH_PORT=5432 and open firewall 5432 (see checklist)

networks:
  default:
  dokploy-network:
    external: true

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy}
      POSTGRES_DB: ${POSTGRES_DB:-event_system_pro}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-event_system_pro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.migrate
    image: event-system-pro-migrate:latest
    restart: "no"
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    environment:
      PGHOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in Dokploy}
      POSTGRES_DB: ${POSTGRES_DB:-event_system_pro}
      SEED_DEV_DATA: ${SEED_DEV_DATA:-true}
    depends_on:
      postgres:
        condition: service_healthy

  postgrest:
    image: postgrest/postgrest:v12.2.8
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    environment:
      PGRST_DB_URI: postgres://authenticator:${PGRST_AUTHENTICATOR_PASSWORD:?Set PGRST_AUTHENTICATOR_PASSWORD}@postgres:5432/${POSTGRES_DB:-event_system_pro}
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_POOL: "10"
      PGRST_SERVER_HOST: 0.0.0.0
      PGRST_SERVER_PORT: "3000"
      PGRST_OPENAPI_SERVER_PROXY_URI: ${APP_URL:-https://imake.wtf}/api
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-https://imake.wtf}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET:?Set PGRST_JWT_SECRET in Dokploy}
    depends_on:
      migrate:
        condition: service_completed_successfully

  realtime:
    build:
      context: ../back-ends/realtime
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://realtime:${REALTIME_DB_PASSWORD:?Set REALTIME_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-event_system_pro}
      COUNTER_INTERVAL_MS: "5000"
      POC_COUNTER_LABEL: poc_counter
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_POSTGREST_URL: ${VITE_POSTGREST_URL:-https://imake.wtf/api}
        VITE_MAILER_URL: ${VITE_MAILER_URL:-https://imake.wtf/mailer}
        VITE_REALTIME_WS_URL: ${VITE_REALTIME_WS_URL:-wss://imake.wtf/realtime/ws}
        DOKPLOY_COMMIT_HASH: ${DOKPLOY_COMMIT_HASH:-}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-dancingevilgenius/event-system-pro}
        BUILD_DATE: ${BUILD_DATE:-}
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    depends_on:
      - postgrest
      - realtime

  proxy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    image: event-system-pro-proxy:latest
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    env_file:
      - .env
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # Traefik routing (HTTP + HTTPS). If you use these labels, remove the same
      # domain from Dokploy Domains tab to avoid duplicate routers.
      - traefik.http.routers.esp-imake-proxy-secure.rule=Host(`${APP_DOMAIN:-imake.wtf}`)
      - traefik.http.routers.esp-imake-proxy-secure.entrypoints=websecure
      - traefik.http.routers.esp-imake-proxy-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.esp-imake-proxy-secure.service=esp-imake-proxy
      - traefik.http.routers.esp-imake-proxy-web.rule=Host(`${APP_DOMAIN:-imake.wtf}`)
      - traefik.http.routers.esp-imake-proxy-web.entrypoints=web
      - traefik.http.routers.esp-imake-proxy-web.middlewares=esp-imake-proxy-redirect
      - traefik.http.routers.esp-imake-proxy-web.service=esp-imake-proxy
      - traefik.http.middlewares.esp-imake-proxy-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.esp-imake-proxy-redirect.redirectscheme.permanent=true
      - traefik.http.services.esp-imake-proxy.loadbalancer.server.port=80
    volumes:
      - caddy_data:/data
    depends_on:
      - web
      - postgrest
      - realtime

volumes:
  pgdata:
  caddy_data:
