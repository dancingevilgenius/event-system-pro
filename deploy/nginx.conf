server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for client-side routes (/home, /staff, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
}
